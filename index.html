  <style>
    .rotar {
      cursor: pointer;
      transition: transform 0.1s;
    }
    .rotar.girando {
      animation: spin 6s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
	}
    .tab-active {
      background-color: #6366f1;
      color: white;
    }
    .tab-inactive {
      background-color: #e5e7eb;
      color: #374151;
    }
    .tab-inactive:hover {
      background-color: #c7d2fe;
      color: #3730a3;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    // Iconos SVG
    const Activity = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">

    );
    
    const Heart = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
      </svg>
    );
    
    const Trophy = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
        <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
        <path d="M4 22h16"/>
        <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
        <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
        <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
      </svg>
    );
    
    const Target = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <circle cx="12" cy="12" r="6"/>
        <circle cx="12" cy="12" r="2"/>
      </svg>
    );
    
    const TrendingUp = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
        <polyline points="16 7 22 7 22 13"/>
      </svg>
    );
    
    const Clock = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
    );
    
    const Zap = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
    );

    const RunBetter = () => {
      const [activeTab, setActiveTab] = React.useState('hf');
      const [hfMax, setHfMax] = React.useState('');
      const [alter, setAlter] = React.useState('');
      const [sexo, setSexo] = React.useState('hombre');
      const [zeit10k, setZeit10k] = React.useState({ min: '', sek: '' });
      const [zeitMarathon, setZeitMarathon] = React.useState({ h: '', min: '' });
      const [zielDistanz, setZielDistanz] = React.useState('10k');
      const [planDistanz, setPlanDistanz] = React.useState('10k');
      const [planTyp, setPlanTyp] = React.useState('10k');

      const berechneHfZonen = () => {
        const hf = parseInt(hfMax);
        if (!hf || hf < 100 || hf > 220) return null;
        return {
          erholung: { min: Math.round(hf * 0.50), max: Math.round(hf * 0.68) },
          zone1: { min: Math.round(hf * 0.68), max: Math.round(hf * 0.72) },
          zone2: { min: Math.round(hf * 0.77), max: Math.round(hf * 0.79) },
          zone3: { min: Math.round(hf * 0.80), max: Math.round(hf * 0.84) },
          zone4: { min: Math.round(hf * 0.85), max: Math.round(hf * 0.88) },
          wettkampf: { min: Math.round(hf * 0.89), max: Math.round(hf * 0.92) }
        };
      };

      const zeitZuSekunden = (h, min, sek) => (h || 0) * 3600 + (min || 0) * 60 + (sek || 0);

      const sekundenZuFormat = (totalSek) => {
        const h = Math.floor(totalSek / 3600);
        const min = Math.floor((totalSek % 3600) / 60);
        const sek = Math.round(totalSek % 60);
        if (h > 0) return `${h}:${min.toString().padStart(2, '0')}:${sek.toString().padStart(2, '0')}`;
        return `${min}:${sek.toString().padStart(2, '0')}`;
      };

      const sekundenZuMinKm = (sekProKm) => {
        const min = Math.floor(sekProKm / 60);
        const sek = Math.round(sekProKm % 60);
        return `${min}:${sek.toString().padStart(2, '0')}`;
      };

      const vorhersageZeiten = (von, zeit) => {
        const sek = zeit;
        let zeiten = {};
        if (von === '10k') {
          zeiten['10k'] = sek;
          zeiten['21k'] = Math.round(sek * 2.182);
          zeiten['42k'] = Math.round(sek * 4.7);
        } else if (von === '42k') {
          zeiten['42k'] = sek;
          zeiten['21k'] = Math.round(sek / 2.154);
          zeiten['10k'] = Math.round(sek / 4.7);
        }
        return zeiten;
      };

      const berechneTempos = () => {
        let tempoMarathon, tempo10k;
        if (zeit10k.min) {
          const sek10k = zeitZuSekunden(0, parseInt(zeit10k.min), parseInt(zeit10k.sek || 0));
          const zeiten = vorhersageZeiten('10k', sek10k);
          tempoMarathon = zeiten['42k'] / 42.195;
          tempo10k = sek10k / 10;
        } else if (zeitMarathon.h || zeitMarathon.min) {
          const sekMarathon = zeitZuSekunden(parseInt(zeitMarathon.h || 0), parseInt(zeitMarathon.min || 0), 0);
          const zeiten = vorhersageZeiten('42k', sekMarathon);
          tempoMarathon = sekMarathon / 42.195;
          tempo10k = zeiten['10k'] / 10;
        } else return null;

        return {
          lockererLauf: { min: tempoMarathon + 60, max: tempoMarathon + 75 },
          rennTempo: {
            km: zielDistanz === '10k' ? '5–6 km' : '5–15 km',
            tempo: zielDistanz === '10k' ? tempo10k : tempoMarathon
          },
          intensiverLauf: {
            tempoMin: zielDistanz === '10k' ? tempo10k + 20 : tempoMarathon + 15,
            tempoMax: zielDistanz === '10k' ? tempo10k + 30 : tempoMarathon + 20,
            distanz: zielDistanz === '10k' ? '8–12 km' : '12–15 km'
          },
          langerLaufBasic: {
            dauer: '1:45–2:00 hrs.',
            beschreibung: 'Year-round, if you are not marathon training',
            tempoMin: tempo10k + 90,
            tempoMax: tempo10k + 105
          },
          langerLaufMarathon: {
            dauer: '2:15–3:00 hrs.',
            beschreibung: 'Increase 10–15 min each week',
            tempoMin: tempoMarathon + 60,
            tempoMax: tempoMarathon + 75
          }
        };
      };

      const hfZonen = berechneHfZonen();
      const tempos = berechneTempos();

      const holeVorhersagen = () => {
        if (zeit10k.min) {
          const sek10k = zeitZuSekunden(0, parseInt(zeit10k.min), parseInt(zeit10k.sek || 0));
          return vorhersageZeiten('10k', sek10k);
        } else if (zeitMarathon.h || zeitMarathon.min) {
          const sekMarathon = zeitZuSekunden(parseInt(zeitMarathon.h || 0), parseInt(zeitMarathon.min || 0), 0);
          return vorhersageZeiten('42k', sekMarathon);
        }
        return null;
      };

      const vorhersagen = holeVorhersagen();

      const getNiveau = () => {
        if (!vorhersagen) return null;
        const marathonHours = vorhersagen['42k'] / 3600;
        if (marathonHours < 2.433) return 'elite';
        if (marathonHours < 3.083) return 'fortgeschritten';
        if (marathonHours < 3.667) return 'mittel';
        return 'anfänger';
      };

      const niveau = getNiveau();
      const empfehlungen = {
        elite: { kmWoche: '120–160 km', qualitätsTage: '3–4 days' },
        fortgeschritten: { kmWoche: '90–120 km', qualitätsTage: '2–3 days' },
        mittel: { kmWoche: '60–90 km', qualitätsTage: '2 days' },
        anfänger: { kmWoche: '60–80 km', qualitätsTage: '1–2 days' }
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
          <div className="max-w-6xl mx-auto">
            <div className="bg-white rounded-2xl shadow-xl p-8 mb-6">
              <div className="flex items-center justify-center gap-3 mb-4">

                <h1 className="text-4xl font-bold text-gray-800">Run Better</h1>
              </div>
              <p className="text-center text-gray-600 text-lg">
                Professional running training based on elite experience (Personal best: 2:19 h Marathon)

                <div className="bg-gradient-to-r from-indigo-50 to-blue-50 p-4 md:p-6 rounded-xl mb-6 md:mb-8 border-l-4 border-indigo-500">
                  <p className="text-sm md:text-base text-gray-700 leading-relaxed italic">
                    Running a marathon means not only covering 42.195 kilometers: it is a physiological, mental, and emotional transformation process that leaves deep marks on everyone who experiences it. After more than 45 years of running, with 28 marathons completed and a personal best under 2:19 h, I have learned that success over this distance comes from the precise combination of science, consistency, and passion. These lines contain technical and personal reflections to help you prepare your marathon with heart and respect for the distance.
                  </p>
                </div>

                <div className="space-y-4 md:space-y-6 max-h-[500px] md:max-h-[600px] overflow-y-auto pr-2 md:pr-4">
                  {[
                    {
                      n: '1', title: 'The Decision: Why a Marathon?',
                      text: 'The marathon is trendy, but it is no mere fashion. It is a serious decision that requires running maturity. Before attempting one, it is advisable to have at least two years of regular running and to have competed in 10 km and half marathon races. Preparing for the marathon will change your daily life. Training and recovery need their place. It is not a sacrifice — it is a dream fulfilled that will help you grow as a runner and as a person.'
                    },
                    {
                      n: '2', title: 'Health: The Foundation of Performance',
                      text: 'Before starting preparation, you should undergo a medical examination. A blood test, electrocardiogram, and stress test are a good foundation and recommended for marathon training. Health is non-negotiable: without it, there is no performance, no enjoyment, and no marathon.'
                    },
                    {
                      n: '3', title: 'Planning: Weeks and Structure',
                      text: ' Eight to 11 weeks of specific training provide a solid foundation for a marathon. The key lies in progression: gradually increasing volume and intensity while adhering to the principles of training, recovery, and adaptation.'
                    },
                    {
                      n: '4', title: 'Training Environment: Place and Community',
                      text: 'Train on familiar routes near your home that make logistics and training control easier. Train with company whenever possible: the group provides support on difficult days and multiplies motivation. The marathon is run alone, but better prepared as a team.'
                    },
                    {
                      n: '5', title: 'Realistic Goal: Much More Than a Time',
                      text: 'In your first marathon, the main goal is to finish. The time comes as a result of good work. Crossing the finish line for the first time is an emotional experience hard to describe: tears, pride, inner stillness, and the deep certainty of having given everything.'
                    },
                    {
                      n: '6', title: 'Training Methodology',
                      text: 'Combine three fundamental pillars: aerobic volume (easy and long runs) to build the physiological base; marathon pace to optimize running economy and get used to the specific effort; and quality work (fartlek, tempo runs, strides, hills) to improve VO₂max and the aerobic threshold.'
                    },
                    {
                      n: '7', title: 'Paces and Weekly Volume',
                      text: 'Amateur runners should run between 60 and 70 km per week, adjusted to their level. The paces should be predominantly aerobic (Zone 2–3), because that is where true endurance is built. Training slowly is not a waste of time — it is an investment in the future.'
                    },
                    {
                      n: '8', title: 'Intensityskontrolle: Pulsmesser und Körpergefühl',
                      text: 'Knowing your maximum heart rate and aerobic threshold allows for precise training. Technology is helpful, but don’t forget to listen to your body: fatigue, recovery, and mood are also important.'
                    },
                    {
                      n: '9', title: 'Long runs are a crucial pillar of marathon training. Sunday morning is ideal for completing the long run. These runs accustom the muscles to working for a long time without interruption, teach the metabolism to get by with fewer carbohydrates, and train mental strength.'
                    },
                    {
                      n: '10', title: 'Time or Kilometers?',
                      text: 'While professional runners plan their training in kilometers, this isn’t particularly recommended for popular runners. Professionals can run 20 km in 1 hour and 30–35 km in 2:00–2:15 hours during training, whereas popular runners may take twice as long to cover the same distance. For this reason, it is not advisable for recreational runners to focus on kilometers, but rather on the amount of time they want to spend training. Otherwise, they will not achieve the recovery necessary for the next training days, which is just as important as the effort itself.'
                    },
                    {
                      n: '11', title: 'Metabolic Adaptation: Fasted Training',
                      text: 'Doing the long run in a fasted state — at 70–72% of maximum HR — improves fat burning and spares glycogen stores. This process is key to avoiding the dreaded "wall at km 30". It is physiological training... and also an exercise in trusting your own body.'
                    },
                    {
                      n: '12', title: 'Recovery: Rebuilding for Further Growth',
                      text: 'Without recovery, there is no adaptation. After the long run, replenish with carbohydrates and quality proteins: oats, ripe fruit, boiled potatoes, whole grain rice. Every meal is an opportunity to rebuild body and motivation.'
                    },
                    {
                      n: '13', title: 'Mindful Nutrition',
                      text: 'A diet based on real foods — vegetables, fruit, legumes, whole grains, and unrefined oils — is the best natural support. Reduce industrial sugar: fewer blood sugar spikes, more energy and emotional stability.'
                    },
                    {
                      n: '14', title: 'Meals and Metabolic Efficiency',
                      text: '2–3 meals per day promote metabolic flexibility, improve fat burning, and give the digestive system a rest. A well-rested digestive system provides more energy for training and recovery.'
                    },
                    {
                      n: '15', title: 'Race Pace: Building Confidence',
                      text: 'Train at marathon pace once a week. Start with 5 km and build up to 12–15 km. You are not only training your body — you are also training the certainty that you can hold that pace when it matters.'
                    },
                    {
                      n: '16', title: 'Races as Physiological and Emotional Tests',
                      text: 'Running 10–15 km at marathon pace or a half marathon four weeks before the marathon is an excellent test. It serves to check fitness, test gear, and confirm that the dream is within reach.'
                    },
                    {
                      n: '17', title: 'Method: Effective Simplicity',
                      text: 'Running 70–80 minutes 2–3 times a week, at a pace 20–25 seconds slower than marathon pace, builds solid endurance. This training is challenging and extremely effective.'
                    },
                    {
                      n: '18', title: 'Shoes: Confidence Under Your Feet',
                      text: 'Shoes should be an extension of your own body. They are never worn for the first time on race day. Use them throughout preparation on pace runs: confidence also needs to be trained.'
                    },
                    {
                      n: '19', title: 'Race Day: Science and Emotion',
                      text: 'Breakfast, I never drank coffee before the marathon so as not to make my nerves even worse. Chamomile tea (to settle my stomach), a roll with butter and honey, and a ripe banana—that was my pre-marathon breakfast, three hours before the start. A 10- to 15-minute easy warm-up before the start is also helpful and prepares your muscles for the exertion. And then, standing at the starting line—now the marathon can begin. I’m well prepared and feel that it was all worth it: every kilometer run, every doubt overcome, every early morning, every effort—none of it was in vain. The marathon isn’t just run with your legs—it’s also run with your mind… and with your heart.”                  },
                  ].map(p => (
                    <div key={p.n} className="bg-white border-2 border-gray-200 rounded-xl p-4 md:p-6 hovnicht er:shadow-lg transition-shadow">
                      <h3 className="text-base md:text-lg font-bold text-indigo-700 mb-2 md:mb-3 leading-snug">{p.n}. {p.title}</h3>
                      <p className="text-sm md:text-base text-gray-700 leading-relaxed">{p.text}</p>
                    </div>
                  ))}

                  <div className="bg-gradient-to-r from-amber-50 to-yellow-50 p-4 md:p-8 rounded-xl border-2 border-amber-300">
                    <h3 className="text-xl md:text-2xl font-bold text-amber-900 mb-3 md:mb-4 text-center">Epilogue</h3>
                    <p className="text-sm md:text-base text-gray-700 leading-relaxed text-center">
                      These reflections come from a life dedicated to running and the privilege of sharing experiences with great athletes like Andrés Espinosa and Julio Rey. From them I learned that the marathon is a physiological and emotional work of art: precision, humility, and passion.
                    </p>
                    <p className="text-sm md:text-base text-gray-700 leading-relaxed text-center mt-3 md:mt-4 font-semibold">
                      If these lines accompany you in your preparation, the goal has already been achieved.
                    </p>
                    <p className="text-center text-lg md:text-xl font-bold text-indigo-700 mt-4 md:mt-6">
                      Manolo
                    </p>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    ReactDOM.render(<RunBetter />, document.getElementById('root'));
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js')
        .then(reg => {
          // Comprueba actualizaciones cada 2 minutos
          setInterval(() => reg.update(), 2 * 60 * 1000);
        });

      // Cuando el SW avisa que hay nueva versión, recarga automáticamente
      navigator.serviceWorker.addEventListener('message', event => {
        if (event.data?.type === 'SW_UPDATED') {
          window.location.reload();
        }
      });
    }
  </script>
