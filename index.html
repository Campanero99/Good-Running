<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Besser Laufen</title>
<link rel="icon" type="image/png" sizes="180x180" href="icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<link rel="manifest" href="manifest.json">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .rotar {
      cursor: pointer;
      transition: transform 0.1s;
    }
    .rotar.girando {
      animation: spin 6s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
	}
    .tab-active {
      background-color: #6366f1;
      color: white;
    }
    .tab-inactive {
      background-color: #e5e7eb;
      color: #374151;
    }
    .tab-inactive:hover {
      background-color: #c7d2fe;
      color: #3730a3;
    }
    .video-minimized {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 240px;
      height: 135px;
      z-index: 1000;
      border-radius: 12px;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid white;
    }
    .video-minimized:hover {
      transform: scale(1.02);
      box-shadow: 0 20px 30px -10px rgba(0,0,0,0.4);
    }
    .video-full {
      width: 100%;
      max-width: 560px;
      border-radius: 12px;
      margin: 0 auto;
      display: block;
    }
    .video-container {
      display: flex;
      justify-content: center;
      margin: 20px 0 0 0;
      position: relative;
    }
    .minimize-btn {
      position: absolute;
      bottom: 12px;
      right: 12px;
      background: rgba(0,0,0,0.65);
      color: #fff;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
      backdrop-filter: blur(4px);
      transition: background 0.2s;
      z-index: 10;
    }
    .minimize-btn:hover {
      background: rgba(0,0,0,0.85);
    }
    .main-content-wrapper {
      transition: opacity 0.5s ease;
    }
    .main-content-hidden {
      opacity: 0;
      pointer-events: none;
    }
    .main-content-visible {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    // Iconos SVG
    const Activity = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
      </svg>
    );
    
    const Heart = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
      </svg>
    );
    
    const Trophy = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
        <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
        <path d="M4 22h16"/>
        <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
        <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
        <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
      </svg>
    );
    
    const Target = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <circle cx="12" cy="12" r="6"/>
        <circle cx="12" cy="12" r="2"/>
      </svg>
    );
    
    const TrendingUp = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
        <polyline points="16 7 22 7 22 13"/>
      </svg>
    );
    
    const Clock = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
    );
    
    const Zap = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
    );

    const BesserLaufen = () => {
      const [activeTab, setActiveTab] = React.useState('hf');
      const [hfMax, setHfMax] = React.useState('');
      const [alter, setAlter] = React.useState('');
      const [sexo, setSexo] = React.useState('hombre');
      const [zeit10k, setZeit10k] = React.useState({ min: '', sek: '' });
      const [zeitMarathon, setZeitMarathon] = React.useState({ h: '', min: '' });
      const [zielDistanz, setZielDistanz] = React.useState('10k');
      const [planTyp, setPlanTyp] = React.useState('10k');
      const [showVideo, setShowVideo] = React.useState(true);
      const [isVideoMinimized, setIsVideoMinimized] = React.useState(false);
      const [showMainContent, setShowMainContent] = React.useState(false);
      const videoRef = React.useRef(null);
      const timerRef = React.useRef(null);

      const tabOrder = ['hf', 'plan', 'tempos', 'zeiten', 'empfehlungen'];

      // Función para detener el video y limpiar el timer
      const stopVideoAndCleanup = React.useCallback(() => {
        if (timerRef.current) {
          clearTimeout(timerRef.current);
          timerRef.current = null;
        }
        if (videoRef.current) {
          videoRef.current.pause();
        }
      }, []);

      // Función para minimizar el video
      const minimizeVideo = React.useCallback(() => {
        if (!isVideoMinimized && showVideo) {
          stopVideoAndCleanup();
          setIsVideoMinimized(true);
          setShowMainContent(true);
        }
      }, [isVideoMinimized, showVideo, stopVideoAndCleanup]);

      // Timer para minimizar el video después de 10 segundos
      React.useEffect(() => {
        if (!showVideo || isVideoMinimized) return;
        
        timerRef.current = setTimeout(() => {
          minimizeVideo();
        }, 10000);
        
        return () => {
          if (timerRef.current) {
            clearTimeout(timerRef.current);
          }
        };
      }, [showVideo, isVideoMinimized, minimizeVideo]);

      // Auto-rotar tabs mientras el video está en modo intro (antes de mostrar contenido)
      React.useEffect(() => {
        if (showMainContent || !showVideo) return;
        let idx = 0;
        const interval = setInterval(() => {
          idx = (idx + 1) % tabOrder.length;
          setActiveTab(tabOrder[idx]);
        }, 4000);
        return () => clearInterval(interval);
      }, [showMainContent, showVideo]);

      // Forzar reproducción automática cuando el video está en pantalla completa
      React.useEffect(() => {
        if (videoRef.current && !isVideoMinimized && showVideo) {
          const playPromise = videoRef.current.play();
          if (playPromise !== undefined) {
            playPromise.catch(error => {
              console.log("Autoplay prevented, user must interact", error);
              // Mostrar un mensaje sutil o simplemente esperar interacción
            });
          }
        }
      }, [isVideoMinimized, showVideo]);

      const handleTabClick = (id) => {
        setActiveTab(id);
      };

      const handleMinimize = () => {
        minimizeVideo();
      };

      const handleMaximize = () => {
        if (timerRef.current) {
          clearTimeout(timerRef.current);
          timerRef.current = null;
        }
        setIsVideoMinimized(false);
        setShowMainContent(false);
        // Forzar reproducción al maximizar
        setTimeout(() => {
          if (videoRef.current) {
            videoRef.current.play().catch(e => console.log("Play error:", e));
          }
        }, 100);
      };

      const handleVideoEnded = () => {
        // Cuando el video termina, minimizamos y mostramos contenido
        if (!isVideoMinimized && showVideo) {
          minimizeVideo();
        }
      };

      const berechneHfZonen = () => {
        const hf = parseInt(hfMax);
        if (!hf || hf < 100 || hf > 220) return null;
        return {
          erholung: { min: Math.round(hf * 0.50), max: Math.round(hf * 0.68) },
          zone1: { min: Math.round(hf * 0.68), max: Math.round(hf * 0.72) },
          zone2: { min: Math.round(hf * 0.77), max: Math.round(hf * 0.79) },
          zone3: { min: Math.round(hf * 0.80), max: Math.round(hf * 0.84) },
          zone4: { min: Math.round(hf * 0.85), max: Math.round(hf * 0.88) },
          wettkampf: { min: Math.round(hf * 0.89), max: Math.round(hf * 0.92) }
        };
      };

      const zeitZuSekunden = (h, min, sek) => (h || 0) * 3600 + (min || 0) * 60 + (sek || 0);

      const sekundenZuFormat = (totalSek) => {
        const h = Math.floor(totalSek / 3600);
        const min = Math.floor((totalSek % 3600) / 60);
        const sek = Math.round(totalSek % 60);
        if (h > 0) return `${h}:${min.toString().padStart(2, '0')}:${sek.toString().padStart(2, '0')}`;
        return `${min}:${sek.toString().padStart(2, '0')}`;
      };

      const sekundenZuMinKm = (sekProKm) => {
        const min = Math.floor(sekProKm / 60);
        const sek = Math.round(sekProKm % 60);
        return `${min}:${sek.toString().padStart(2, '0')}`;
      };

      const vorhersageZeiten = (von, zeit) => {
        const sek = zeit;
        let zeiten = {};
        if (von === '10k') {
          zeiten['10k'] = sek;
          zeiten['21k'] = Math.round(sek * 2.182);
          zeiten['42k'] = Math.round(sek * 4.7);
        } else if (von === '42k') {
          zeiten['42k'] = sek;
          zeiten['21k'] = Math.round(sek / 2.154);
          zeiten['10k'] = Math.round(sek / 4.7);
        }
        return zeiten;
      };

      const berechneTempos = () => {
        let tempoMarathon, tempo10k;
        if (zeit10k.min) {
          const sek10k = zeitZuSekunden(0, parseInt(zeit10k.min), parseInt(zeit10k.sek || 0));
          const zeiten = vorhersageZeiten('10k', sek10k);
          tempoMarathon = zeiten['42k'] / 42.195;
          tempo10k = sek10k / 10;
        } else if (zeitMarathon.h || zeitMarathon.min) {
          const sekMarathon = zeitZuSekunden(parseInt(zeitMarathon.h || 0), parseInt(zeitMarathon.min || 0), 0);
          const zeiten = vorhersageZeiten('42k', sekMarathon);
          tempoMarathon = sekMarathon / 42.195;
          tempo10k = zeiten['10k'] / 10;
        } else return null;

        return {
          lockererLauf: { min: tempoMarathon + 60, max: tempoMarathon + 75 },
          rennTempo: {
            km: zielDistanz === '10k' ? '5–6 km' : '5–15 km',
            tempo: zielDistanz === '10k' ? tempo10k : tempoMarathon
          },
          intensiverLauf: {
            tempoMin: zielDistanz === '10k' ? tempo10k + 20 : tempoMarathon + 15,
            tempoMax: zielDistanz === '10k' ? tempo10k + 30 : tempoMarathon + 20,
            distanz: zielDistanz === '10k' ? '8–12 km' : '12–15 km'
          },
          langerLaufBasic: {
            dauer: '1:45–2:00 Std.',
            beschreibung: 'Das ganze Jahr über, wenn du kein Marathonläufer bist',
            tempoMin: tempo10k + 90,
            tempoMax: tempo10k + 105
          },
          langerLaufMarathon: {
            dauer: '2:15–3:00 Std.',
            beschreibung: 'Jede Woche um 10–15 Min. steigern',
            tempoMin: tempoMarathon + 60,
            tempoMax: tempoMarathon + 75
          }
        };
      };

      const hfZonen = berechneHfZonen();
      const tempos = berechneTempos();

      const holeVorhersagen = () => {
        if (zeit10k.min) {
          const sek10k = zeitZuSekunden(0, parseInt(zeit10k.min), parseInt(zeit10k.sek || 0));
          return vorhersageZeiten('10k', sek10k);
        } else if (zeitMarathon.h || zeitMarathon.min) {
          const sekMarathon = zeitZuSekunden(parseInt(zeitMarathon.h || 0), parseInt(zeitMarathon.min || 0), 0);
          return vorhersageZeiten('42k', sekMarathon);
        }
        return null;
      };

      const vorhersagen = holeVorhersagen();

      const getNiveau = () => {
        if (!vorhersagen) return null;
        const marathonStunden = vorhersagen['42k'] / 3600;
        if (marathonStunden < 2.433) return 'elite';
        if (marathonStunden < 3.083) return 'fortgeschritten';
        if (marathonStunden < 3.667) return 'mittel';
        return 'anfänger';
      };

      const niveau = getNiveau();
      const empfehlungen = {
        elite: { kmWoche: '120–160 km', qualitätsTage: '3–4 Tage' },
        fortgeschritten: { kmWoche: '90–120 km', qualitätsTage: '2–3 Tage' },
        mittel: { kmWoche: '60–90 km', qualitätsTage: '2 Tage' },
        anfänger: { kmWoche: '60–80 km', qualitätsTage: '1–2 Tage' }
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
          <div className="max-w-6xl mx-auto">
            <div className="bg-white rounded-2xl shadow-xl p-8 mb-6">
              <div className="flex items-center justify-center gap-3 mb-4">
                <Activity className="w-12 h-12 text-indigo-600" />
                <h1 className="text-4xl font-bold text-gray-800">Besser Laufen</h1>
              </div>
              <p className="text-center text-gray-600 text-lg">
                Professionelles Lauftraining auf der Grundlage von Elite-Erfahrung (Persönliche Bestzeit: 2:19 h Marathon)
              </p>
              
              {/* Video integrado debajo del primer cuadro */}
              {showVideo && !isVideoMinimized && (
                <div className="video-container">
                  <video
                    ref={videoRef}
                    src="corredora-corredor.mp4"
                    autoPlay
                    muted
                    playsInline
                    controls
                    className="video-full"
                    onEnded={handleVideoEnded}
                  />
                  <div className="minimize-btn" onClick={handleMinimize}>
                    Minimieren →
                  </div>
                </div>
              )}
            </div>

            {/* Contenido principal (tabs y paneles) */}
            <div className={`main-content-wrapper ${showMainContent ? 'main-content-visible' : 'main-content-hidden'} transition-opacity duration-500`}>
              <div className="bg-white rounded-2xl shadow-xl mb-6 p-2">
                <div className="flex gap-2 flex-wrap">
                  {[
                    { id: 'hf', icon: <Heart className="w-5 h-5 inline mr-2" />, label: 'HF-Zonen' },
                    { id: 'plan', icon: <Clock className="w-5 h-5 inline mr-2" />, label: 'Trainingsplan' },
                    { id: 'tempos', icon: <Target className="w-5 h-5 inline mr-2" />, label: 'Tempi' },
                    { id: 'zeiten', icon: <Trophy className="w-5 h-5 inline mr-2" />, label: 'Prognose' },
                    { id: 'empfehlungen', icon: <TrendingUp className="w-5 h-5 inline mr-2" />, label: 'Empfehlungen' },
                  ].map(tab => (
                    <button key={tab.id} onClick={() => handleTabClick(tab.id)}
                      className={`flex-1 min-w-[140px] py-3 px-4 rounded-xl font-semibold transition-all ${activeTab === tab.id ? 'bg-indigo-600 text-white shadow-lg' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                      {tab.icon}{tab.label}
                    </button>
                  ))}
                </div>
              </div>

              {activeTab === 'hf' && (
                <div className="bg-white rounded-2xl shadow-xl p-8">
                  <h2 className="text-1xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                    <Heart className="w-7 h-7 text-red-500" />
                    Herzfrequenz-Zonen
                  </h2>

                  <div className="mb-6 bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded">
                    <p className="text-yellow-800 font-semibold">
                      💡 Empfehlung: Führe einen Belastungstest durch, um deine tatsächliche maximale Herzfrequenz zu ermitteln.
                    </p>
                  </div>

                  <div className="grid md:grid-cols-2 gap-6 mb-6">
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-2">Deine maximale HF (gemessen oder aus einem Test)</label>
                      <input type="number" value={hfMax} onChange={e => setHfMax(e.target.value)} placeholder="z. B. 185"
                        className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-indigo-500 focus:outline-none text-lg" />
                    </div>
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-2">Geschlecht</label>
                      <div className="flex gap-3 mb-3">
                        <button
                          onClick={() => setSexo('hombre')}
                          className={`flex-1 py-2 px-4 rounded-xl font-semibold border-2 transition-colors ${sexo === 'hombre' ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-gray-700 border-gray-300 hover:border-indigo-400'}`}>
                          Männlich
                        </button>
                        <button
                          onClick={() => setSexo('mujer')}
                          className={`flex-1 py-2 px-4 rounded-xl font-semibold border-2 transition-colors ${sexo === 'mujer' ? 'bg-pink-500 text-white border-pink-500' : 'bg-white text-gray-700 border-gray-300 hover:border-pink-400'}`}>
                          Weiblich
                        </button>
                      </div>
                      <label className="block text-sm font-semibold text-gray-700 mb-2">Alter (zur Berechnung der max. HF)</label>
                      <input type="number" value={alter} onChange={e => setAlter(e.target.value)} placeholder="z. B. 35"
                        className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-indigo-500 focus:outline-none text-lg" />
                      {alter && (
                        <p className="text-sm text-indigo-600 mt-1 font-medium">
                          Geschätzte max. HF ({sexo === 'hombre' ? '211 − 0,64 × Alter' : '215 − 0,64 × Alter'}): {sexo === 'hombre' ? Math.round(211 - 0.64 * parseInt(alter)) : Math.round(215 - 0.64 * parseInt(alter))} bpm
                          <button onClick={() => setHfMax(String(sexo === 'hombre' ? Math.round(211 - 0.64 * parseInt(alter)) : Math.round(215 - 0.64 * parseInt(alter))))}
                            className="ml-2 text-xs bg-indigo-600 text-white px-2 py-0.5 rounded-lg hover:bg-indigo-700">
                            Übernehmen
                          </button>
                        </p>
                      )}
                    </div>
                  </div>

                  {hfZonen && (
                    <div className="space-y-3">
                      <h3 className="text-xl font-bold text-gray-800 mb-4">Deine Trainingszonen:</h3>
                      {[
                        { label: 'Erholung', percent: '(<68%)', range: `< ${hfZonen.erholung.max} bpm`, colors: 'from-green-50 to-green-100 border-green-300 text-green-800' },
                        { label: 'Zone 1', percent: '(68-72%)', range: `${hfZonen.zone1.min}-${hfZonen.zone1.max} bpm`, colors: 'from-blue-50 to-blue-100 border-blue-300 text-blue-800' },
                        { label: 'Zone 2', percent: '(77-79%)', range: `${hfZonen.zone2.min}-${hfZonen.zone2.max} bpm`, colors: 'from-cyan-50 to-cyan-100 border-cyan-300 text-cyan-800' },
                        { label: 'Zone 3', percent: '(80-84%)', range: `${hfZonen.zone3.min}-${hfZonen.zone3.max} bpm`, colors: 'from-orange-50 to-orange-100 border-orange-300 text-orange-800' },
                        { label: 'Zone 4', percent: '(85-88%)', range: `${hfZonen.zone4.min}-${hfZonen.zone4.max} bpm`, colors: 'from-red-50 to-red-100 border-red-300 text-red-800' },
                        { label: 'Wettkampf-\ntempo', percent: '(89-92%)', range: `${hfZonen.wettkampf.min}-${hfZonen.wettkampf.max} bpm`, colors: 'from-purple-50 to-purple-100 border-purple-300 text-purple-800' },
                      ].map(z => {
                        const [c1,c2,c3,c4] = z.colors.split(' ');
                        return (
                          <div key={z.label} className={`bg-gradient-to-r ${c1} ${c2} p-4 rounded-xl border-2 ${c3}`}>
                            <p className={`font-bold ${c4} mb-2 whitespace-pre-line`}>{z.label} {z.percent}</p>
                            <p className={`text-2xl font-bold ${c4} text-right`}>{z.range}</p>
                          </div>
                        );
                      })}
                    </div>
                  )}

                  {hfZonen && (
                    <div className="mt-8">
                      <h3 className="text-xl font-bold text-gray-800 mb-4">Vollständige Herzfrequenztabelle:</h3>
                      <div className="bg-white border-2 border-gray-200 rounded-xl overflow-hidden">
                        <div className="grid grid-cols-2 bg-blue-600 text-white font-bold p-3">
                          <div className="text-center text-sm">Intensität</div>
                          <div className="text-center text-sm">Herzfrequenz</div>
                        </div>
                        <div className="max-h-96 overflow-y-auto">
                          {Array.from({ length: 36 }, (_, i) => {
                            const prozent = 65 + i;
                            const frequenz = Math.round(parseInt(hfMax) * (prozent / 100));
                            return (
                              <div key={prozent} className={`grid grid-cols-2 p-3 border-b border-gray-200 ${i % 2 === 0 ? 'bg-gray-50' : 'bg-white'}`}>
                                <div className="text-center text-blue-700 font-bold text-base">{prozent} %</div>
                                <div className="text-center text-blue-900 font-bold text-base">{frequenz}</div>
                              </div>
                            );
                          })}
                          <div className="grid grid-cols-2 p-3 bg-blue-100 border-t-2 border-blue-300">
                            <div className="text-center text-blue-800 font-bold text-base">Max %</div>
                            <div className="text-center text-blue-900 font-bold text-base">{hfMax}</div>
                          </div>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {activeTab === 'zeiten' && (

                      {
                        n: '13', title: 'Bewusste Ernährung',
                        text: 'Eine Ernährung auf Basis echter Lebensmittel – Gemüse, Obst, Hülsenfrüchte, Vollkornprodukte und native Öle – ist die beste natürliche Unterstützung. Industriellen Zucker reduzieren: weniger Blutzuckerspitzen, mehr Energie- und emotionale Stabilität.'
                      },
                      {
                        n: '14', title: 'Mahlzeiten und metabolische Effizienz',
                        text: '2–3 Mahlzeiten pro Tag fördern die metabolische Flexibilität, verbessern die Fettverbrennung und entlasten das Verdauungssystem. Ein gut ausgeruhtes Verdauungssystem stellt mehr Energie für Training und Erholung bereit.'
                      },
                      {
                        n: '15', title: 'Wettkampftempo: Vertrauen aufbauen',
                        text: 'Trainiere einmal pro Woche im Marathontempo. Beginne mit 5 km und steigere dich auf 12–15 km. Du trainierst nicht nur den Körper – du trainierst auch die Gewissheit, dass du dieses Tempo halten kannst, wenn es darauf ankommt.'
                      },
                      {
                        n: '16', title: 'Wettkämpfe als physiologischer und emotionaler Test',
                        text: '10–15 km im Marathontempo oder einen Halbmarathon vier Wochen vor dem Marathon zu laufen, ist ein ausgezeichneter Test. Er dient dazu, die Form zu überprüfen, Material zu testen und sich zu vergewissern, dass der Traum erreichbar ist.'
                      },
                      {
                        n: '17', title: 'Methode: Wirksame Einfachheit',
                        text: '2–3-mal pro Woche 70–80 Minuten zu laufen, 20–25 Sekunden langsamer als das Marathontempo, baut eine solide Ausdauer auf. Dieses Training ist anspruchsvoll und äußerst wirksam.'
                      },
                      {
                        n: '18', title: 'Schuhe: Vertrauen unter den Füßen',
                        text: 'Die Schuhe sollten eine Verlängerung des eigenen Körpers sein. Sie werden am Wettkampftag niemals zum ersten Mal getragen. Verwende sie während der gesamten Vorbereitung bei Tempoläufen: Auch Vertrauen will trainiert sein.'
                      },
                      {
                        n: '19', title: 'Der Wettkampftag: Wissenschaft und Emotion',
                        text: 'Frühstück: Mein Frühstück vor dem Marathon: Kamillentee (Magen bruhigend) und ein Brötchen mit Butter und Honig sowie eine reife Banane – drei Stunden vor dem Start war mein Frühstück vor dem Marathon. Ein 10-15 minutiges lockeres Einlaufen tut auch gut und bereitet die Muskulatur auf die Belastung vor. Und dann, an der Startlinie gehen, jetzt kann der Marathon kommen, Du bist gut vorbereitet und hast das Gefühl, dass sich alles gelohnt hat: jeder gelaufener Kilometer, jeder überwundene Zweifel, jedes frühe Aufstehen, jede Anstrengung, nicht umsonst war. Der Marathon wird nicht nur mit den Beinen gelaufen – er wird auch mit dem Kopf gelaufen … und mit dem Herzen.'
                      },
                    ].map(p => (
                      <div key={p.n} className="bg-white border-2 border-gray-200 rounded-xl p-4 md:p-6 hover:shadow-lg transition-shadow">
                        <h3 className="text-base md:text-lg font-bold text-indigo-700 mb-2 md:mb-3 leading-snug">{p.n}. {p.title}</h3>
                        <p className="text-sm md:text-base text-gray-700 leading-relaxed">{p.text}</p>
                      </div>
                    ))}

                    <div className="bg-gradient-to-r from-amber-50 to-yellow-50 p-4 md:p-8 rounded-xl border-2 border-amber-300">
                      <h3 className="text-xl md:text-2xl font-bold text-amber-900 mb-3 md:mb-4 text-center">Epilog</h3>
                      <p className="text-sm md:text-base text-gray-700 leading-relaxed text-center">
                        Diese Überlegungen entstammen einem dem Laufsport gewidmeten Leben und dem Glück, Erfahrungen mit großartigen Athleten wie Andrés Espinosa oder Julio Rey geteilt zu haben. Von ihnen habe ich gelernt, dass der Marathon ein physiologisches und emotionales Kunstwerk ist: Präzision, Bescheidenheit und Leidenschaft.
                      </p>
                      <p className="text-sm md:text-base text-gray-700 leading-relaxed text-center mt-3 md:mt-4 font-semibold">
                        Wenn diese Zeilen dich bei deiner Vorbereitung begleiten, ist das Ziel bereits erreicht.
                      </p>
                      <p className="text-center text-lg md:text-xl font-bold text-indigo-700 mt-4 md:mt-6">
                        Manolo
                      </p>
                    </div>
                  </div>
                </div>
              )}
            </div>

            {/* Video minimizado (flotante) */}
            {showVideo && isVideoMinimized && (
              <video
                ref={videoRef}
                src="corredora-corredor.mp4"
                autoPlay
                muted
                loop
                playsInline
                className="video-minimized"
                onClick={handleMaximize}
                title="Klicken zum Maximieren"
              />
            )}
          </div>
        </div>
      );
    };

    ReactDOM.render(<BesserLaufen />, document.getElementById('root'));
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js')
        .then(reg => {
          setInterval(() => reg.update(), 2 * 60 * 1000);
        });

      navigator.serviceWorker.addEventListener('message', event => {
        if (event.data?.type === 'SW_UPDATED') {
          window.location.reload();
        }
      });
    }
  </script>
</body>
</html>
